<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Product</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="page-shell">
    <section class="card">
        <h1 class="title">Update Product</h1>

        <form th:action="@{/products/edit/{id}(id=${id})}" method="post" th:object="${pForm}" class="form-grid">
            <input type="hidden" th:field="*{id}">

            <div class="form-field">
                <label for="code">Code</label>
                <input id="code" type="text" th:field="*{code}" class="input">
                <small class="field-error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></small>
            </div>

            <div class="form-field">
                <label for="name">Name</label>
                <input id="name" type="text" th:field="*{name}" class="input">
                <small class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </div>

            <div class="form-field">
                <label for="price">Price</label>
                <input id="price" type="number" step="0.01" th:field="*{price}" class="input">
                <small class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></small>
            </div>

            <div class="form-field">
                <label for="quantity">Quantity</label>
                <input id="quantity" type="number" th:field="*{quantity}" class="input">
                <small class="field-error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></small>
            </div>

            <div class="form-field form-field-full">
                <label for="img">Image File Name</label>
                <input id="img" type="text" th:field="*{img}" class="input" placeholder="example.png">
            </div>

            <div class="form-actions form-field-full">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a th:href="@{/products}" class="btn btn-warning">Back</a>
            </div>
        </form>
    </section>
</main>
<div th:replace="~{fragments :: footer}">
</div>
</body>
</html>
