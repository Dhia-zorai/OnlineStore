<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product list</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<main class="page-shell">
    <section class="card">
        <div class="toolbar">
            <div class="brand"><h1 class="title">Product list</h1>
            </div>
            <a th:href="@{/products/create}" class="btn btn-primary">Create New Product</a>
        </div>

        <div th:if="${not #lists.isEmpty(ProdList)}" class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Image</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${ProdList}">
                    <td th:text="${product.code}">Code</td>
                    <td th:text="${product.name}">Name</td>
                    <td th:text="${product.price}">Price</td>
                    <td th:text="${product.quantity}">Quantity</td>
                    <td th:text="${product.img}">Image</td>
                    <td>
                        <div class="actions">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning">Edit</a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}"
                               onclick="confirm('Are you sure you want to delete this product')" class="btn btn-danger">Delete</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <p th:if="${#lists.isEmpty(ProdList)}">Product list is empty</p>
    </section>
</main>
<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
